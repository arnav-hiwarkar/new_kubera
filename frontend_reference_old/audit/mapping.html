<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger Mapping — AuditEase</title>
  <meta name="description" content="Map trial balance ledgers to standard groups." />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/pages/audit.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="topbar-mount"></div>
  <div id="sidebar-mount"></div>
  <main class="page-layout">

    <nav class="audit-subnav" id="audit-subnav">
      <a href="/audit/engagement.html" data-page="overview">Overview</a>
      <a href="/audit/trial-balance.html" data-page="trial-balance">Trial Balance</a>
      <a href="/audit/mapping.html" class="active" data-page="mapping">Mapping</a>
      <a href="/audit/entries.html" data-page="entries">Entries</a>
      <a href="/audit/adjusted-tb.html" data-page="adjusted-tb">Adjusted TB</a>
      <a href="/audit/financials.html" data-page="financials">Financials</a>
      <a href="/audit/queries.html" data-page="queries">Queries</a>
      <a href="/audit/report.html" data-page="report">Report</a>
    </nav>

    <div class="page-content with-subnav" id="main-content">
      <div class="audit-page-content audit-page-content--wide">

      <div class="audit-page-header">
        <div>
          <h1>Ledger Mapping</h1>
          <p style="font-size:13px;color:var(--text-secondary);margin-top:4px;">
            Assign each trial balance ledger to a standard group.
          </p>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div id="mapping-progress-label" style="font-size:12px;color:var(--text-muted);"></div>
          <button class="btn btn-primary" id="btn-save-mapping">Save Mapping</button>
        </div>
      </div>

      <div class="mapping-progress-bar-track" id="mapping-progress-track">
        <div class="mapping-progress-bar-fill" id="mapping-progress-fill" style="width:0%;"></div>
      </div>

      <div class="mapping-layout" id="mapping-layout">
        <div class="mapping-left" id="mapping-left">
          <!-- Group tree populated by JS -->
        </div>
        <div class="mapping-right" id="mapping-right">
          <!-- Mapping detail / ledger list populated by JS -->
        </div>
      </div>

      </div>
    </div>
  </main>
  <script src="/js/auth.js"></script>
  <script src="/js/topbar.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/pages/audit-mapping.js"></script>
</body>
</html>
