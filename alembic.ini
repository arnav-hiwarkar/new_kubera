[alembic]
script_location = alembic
# Put the repo root on sys.path so env.py can `import app` when the `alembic` CLI
# is run from here (e.g. `uv run alembic ...`), independent of PYTHONPATH.
prepend_sys_path = .
# This URL is a fallback only — alembic/env.py overrides it with DATABASE_URL from
# app settings so host (localhost:5433) and container (postgres:5432) both work.
sqlalchemy.url = postgresql+asyncpg://kubera:kubera_secret@postgres:5432/kubera

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
